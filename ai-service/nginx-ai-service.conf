# AI Service 反向代理配置
# 将此配置添加到你的 Nginx 主配置文件中，或作为独立的配置文件包含

# 定义上游服务器（AI Service）
upstream ai_service {
    server 127.0.0.1:8001;
    # 如果需要负载均衡，可以添加多个服务器：
    # server 127.0.0.1:8002;
    keepalive 32;
}

server {
    listen 80;
    # 如果使用 HTTPS，取消下面的注释并配置 SSL
    # listen 443 ssl http2;
    server_name api.xifg.com.cn;  # 根据你的实际域名修改

    # SSL 配置（如果使用 HTTPS）
    # ssl_certificate /path/to/your/cert.pem;
    # ssl_certificate_key /path/to/your/key.pem;

    # ... 这里是你原来 main-api 的配置 ...

    # ============================================
    # AI Service 内部接口反向代理
    # ============================================
    # 路径：/_internal/ai/
    # 说明：只给主后端（main-api）使用，不对外暴露
    location /_internal/ai/ {
        # 代理到 AI Service
        proxy_pass http://ai_service/;
        
        # 自动附加内部调用 Token（必须与 ai-service 的 AI_INTERNAL_TOKEN 一致）
        proxy_set_header X-Internal-Token "your-internal-token-here";
        
        # 保留原始请求信息
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # 超时设置
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
        
        # 缓冲设置
        proxy_buffering on;
        proxy_buffer_size 4k;
        proxy_buffers 8 4k;
        
        # 不记录访问日志（可选，因为是内部调用）
        # access_log off;
    }

    # 如果需要健康检查接口对外暴露（可选）
    # location /ai/health {
    #     proxy_pass http://ai_service/health;
    #     proxy_set_header Host $host;
    #     proxy_set_header X-Real-IP $remote_addr;
    #     proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    # }
}


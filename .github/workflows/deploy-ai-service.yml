name: Deploy AI Service to ECS

on:
  push:
    branches:
      - master
    paths:
      - 'ai-service/**'
      - '.github/workflows/deploy-ai-service.yml'

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Cache pip dependencies
        uses: actions/cache@v3
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('ai-service/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        working-directory: ./ai-service
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Deploy to Server
        uses: easingthemes/ssh-deploy@v5.0.0
        with:
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
          REMOTE_HOST: ${{ secrets.REMOTE_HOST }}
          REMOTE_USER: ${{ secrets.REMOTE_USER }}
          TARGET: "/srv/ai-service/"
          SOURCE: "ai-service/"
          ARGS: "-rltgoDzvO --delete --exclude='venv' --exclude='__pycache__' --exclude='*.pyc' --exclude='.env' --exclude='logs'"

      - name: Setup Python on Server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.REMOTE_HOST }}
          username: ${{ secrets.REMOTE_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd /srv/ai-service
            
            # 检查并安装 Python 3.11（如果不存在）
            if ! command -v python3.11 &> /dev/null; then
              echo "Python 3.11 未找到，尝试安装..."
              
              # 检测系统类型
              if [ -f /etc/os-release ]; then
                . /etc/os-release
                if [ "$ID" = "ubuntu" ] || [ "$ID" = "debian" ]; then
                  # Ubuntu/Debian 系统
                  sudo apt-get update
                  sudo apt-get install -y software-properties-common
                  sudo add-apt-repository -y ppa:deadsnakes/ppa
                  sudo apt-get update
                  sudo apt-get install -y python3.11 python3.11-venv python3.11-dev
                  PYTHON_CMD="python3.11"
                elif [ "$ID" = "centos" ] || [ "$ID" = "rhel" ]; then
                  # CentOS/RHEL 系统
                  sudo yum install -y python3.11 python3.11-pip
                  PYTHON_CMD="python3.11"
                else
                  echo "⚠️  未识别的系统，使用系统默认 Python"
                  PYTHON_CMD="python3"
                fi
              else
                echo "⚠️  无法检测系统类型，使用系统默认 Python"
                PYTHON_CMD="python3"
              fi
            else
              echo "✅ Python 3.11 已安装"
              PYTHON_CMD="python3.11"
            fi
            
            # 显示 Python 版本
            $PYTHON_CMD --version
            
            # 创建虚拟环境（如果不存在或需要重建）
            if [ ! -d "venv" ]; then
              echo "创建虚拟环境..."
              $PYTHON_CMD -m venv venv
            else
              echo "虚拟环境已存在"
            fi
            
            # 激活虚拟环境并安装/更新依赖
            source venv/bin/activate
            python --version
            pip install --upgrade pip
            pip install -r requirements.txt

      - name: Install Systemd Service
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.REMOTE_HOST }}
          username: ${{ secrets.REMOTE_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            # 复制 systemd 服务文件（如果不存在）
            if [ ! -f /etc/systemd/system/ai-service.service ]; then
              sudo cp /srv/ai-service/ai-service.service /etc/systemd/system/
              sudo systemctl daemon-reload
              sudo systemctl enable ai-service
            fi

      - name: Restart Service
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.REMOTE_HOST }}
          username: ${{ secrets.REMOTE_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            # 检查服务是否存在
            if systemctl list-unit-files | grep -q ai-service.service; then
              sudo systemctl daemon-reload
              sudo systemctl restart ai-service
              sleep 2
              sudo systemctl status ai-service --no-pager
            else
              echo "⚠️  ai-service.service 未找到，请手动安装服务文件"
            fi

      - name: Health Check
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.REMOTE_HOST }}
          username: ${{ secrets.REMOTE_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            sleep 3
            if curl -f http://127.0.0.1:8001/health > /dev/null 2>&1; then
              echo "✅ AI Service 健康检查通过"
            else
              echo "❌ AI Service 健康检查失败"
              sudo journalctl -u ai-service -n 20 --no-pager
              exit 1
            fi


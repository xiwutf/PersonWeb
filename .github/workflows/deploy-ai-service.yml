name: Deploy AI Service to ECS

on:
  push:
    branches:
      - master
    paths:
      - 'ai-service/**'
      - '.github/workflows/deploy-ai-service.yml'

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Cache pip dependencies
        uses: actions/cache@v3
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('ai-service/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        working-directory: ./ai-service
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Deploy to Server
        uses: easingthemes/ssh-deploy@v5.0.0
        with:
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
          REMOTE_HOST: ${{ secrets.REMOTE_HOST }}
          REMOTE_USER: ${{ secrets.REMOTE_USER }}
          TARGET: "/srv/ai-service/"
          SOURCE: "ai-service/"
          ARGS: "-rltgoDzvO --delete --exclude='venv' --exclude='__pycache__' --exclude='*.pyc' --exclude='.env' --exclude='logs'"

      - name: Setup Python on Server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.REMOTE_HOST }}
          username: ${{ secrets.REMOTE_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          timeout: 300s
          command_timeout: 300s
          script: |
            cd /srv/ai-service
            
            # 检测可用的 Python 版本（优先使用 3.11，否则使用 3.10+）
            if command -v python3.11 &> /dev/null; then
              echo "✅ 使用 Python 3.11"
              PYTHON_CMD="python3.11"
            elif command -v python3.10 &> /dev/null; then
              echo "✅ 使用 Python 3.10"
              PYTHON_CMD="python3.10"
            elif command -v python3 &> /dev/null; then
              echo "✅ 使用系统默认 Python 3"
              PYTHON_CMD="python3"
            else
              echo "❌ 未找到 Python 3，请手动安装"
              exit 1
            fi
            
            # 显示 Python 版本
            $PYTHON_CMD --version
            
            # 创建虚拟环境（如果不存在）
            if [ ! -d "venv" ]; then
              echo "创建虚拟环境..."
              $PYTHON_CMD -m venv venv
            else
              echo "虚拟环境已存在，检查是否需要更新..."
            fi
            
            # 激活虚拟环境并安装/更新依赖
            source venv/bin/activate
            python --version
            pip install --upgrade pip
            pip install -r requirements.txt

      - name: Install Systemd Service
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.REMOTE_HOST }}
          username: ${{ secrets.REMOTE_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          timeout: 60s
          command_timeout: 60s
          script: |
            # 复制 systemd 服务文件（如果不存在或需要更新）
            if [ ! -f /etc/systemd/system/ai-service.service ] || [ /srv/ai-service/ai-service.service -nt /etc/systemd/system/ai-service.service ]; then
              echo "安装/更新 systemd 服务文件..."
              sudo cp /srv/ai-service/ai-service.service /etc/systemd/system/
              
              # 确保启动命令格式正确（检查是否使用 python -m uvicorn）
              if ! grep -q "python -m uvicorn" /etc/systemd/system/ai-service.service 2>/dev/null; then
                echo "修复启动命令格式..."
                sudo sed -i 's|^ExecStart=/srv/ai-service/venv/bin/uvicorn|ExecStart=/srv/ai-service/venv/bin/python -m uvicorn|g' /etc/systemd/system/ai-service.service
              fi
              
              sudo systemctl daemon-reload
              sudo systemctl enable ai-service
              echo "✅ 服务文件已安装/更新"
            else
              echo "✅ 服务文件已是最新版本"
            fi

      - name: Restart Service
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.REMOTE_HOST }}
          username: ${{ secrets.REMOTE_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          timeout: 60s
          command_timeout: 60s
          script: |
            # 检查服务是否存在
            if systemctl list-unit-files | grep -q ai-service.service; then
              # 修复服务文件中的启动命令（如果格式不正确）
              if ! grep -q "python -m uvicorn" /etc/systemd/system/ai-service.service 2>/dev/null; then
                echo "⚠️  发现错误的启动命令格式，正在修复..."
                sudo sed -i 's|^ExecStart=/srv/ai-service/venv/bin/uvicorn|ExecStart=/srv/ai-service/venv/bin/python -m uvicorn|g' /etc/systemd/system/ai-service.service
                echo "✅ 已修复启动命令"
              fi
              
              # 确保日志目录存在且可写
              sudo mkdir -p /srv/ai-service/logs
              sudo chown www-data:www-data /srv/ai-service/logs
              sudo chmod 775 /srv/ai-service/logs
              
              # 确保向量数据库目录存在且可写
              sudo mkdir -p /srv/ai-service/data/chroma
              sudo chown www-data:www-data /srv/ai-service/data
              sudo chown www-data:www-data /srv/ai-service/data/chroma
              sudo chmod 775 /srv/ai-service/data
              sudo chmod 775 /srv/ai-service/data/chroma
              
              # 重新加载 systemd 配置
              sudo systemctl daemon-reload
              
              # 重启服务
              sudo systemctl restart ai-service
              sleep 3
              
              # 检查服务状态
              if sudo systemctl is-active --quiet ai-service; then
                echo "✅ 服务启动成功"
                sudo systemctl status ai-service --no-pager -l
              else
                echo "❌ 服务启动失败，查看详细日志："
                sudo journalctl -u ai-service -n 50 --no-pager
                exit 1
              fi
            else
              echo "⚠️  ai-service.service 未找到，请手动安装服务文件"
            fi

      - name: Health Check
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.REMOTE_HOST }}
          username: ${{ secrets.REMOTE_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          timeout: 30s
          command_timeout: 30s
          script: |
            sleep 3
            if curl -f http://127.0.0.1:8001/health > /dev/null 2>&1; then
              echo "✅ AI Service 健康检查通过"
            else
              echo "❌ AI Service 健康检查失败"
              sudo journalctl -u ai-service -n 20 --no-pager
              exit 1
            fi


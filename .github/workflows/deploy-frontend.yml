name: Deploy Frontend to Server

on:
  push:
    branches:
      - master

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build for Node Server
        env:
          NODE_ENV: production
          NUXT_PUBLIC_API_BASE: https://api.xifg.com.cn/api
        run: npm run build

      - name: Deploy to server
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SERVER_PORT }}
          script: |
            # 停止旧进程
            pm2 stop nuxt-app || true
            pm2 delete nuxt-app || true

            # 备份旧版本
            mv ~/PersonWeb ~/PersonWeb.backup.$(date +%Y%m%d%H%M%S) || true

            # 创建目录
            mkdir -p ~/PersonWeb

            # 上传新版本
            scp -r .output/* ~/PersonWeb/

            # 启动新服务
            cd ~/PersonWeb
            pm2 start server/index.mjs --name nuxt-app
            pm2 save

            # 清理旧备份（保留最近3个）
            ls -dt ~/PersonWeb.backup.* | tail -n +4 | xargs rm -rf || true

name: Deploy Frontend to Aliyun OSS

on:
  push:
    branches:
      - master

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Generate static site
        env:
          NODE_ENV: production
          NUXT_PUBLIC_API_BASE: ${{ secrets.NUXT_PUBLIC_API_BASE }}
          # 增加 Node.js 堆内存限制，避免内存溢出（GitHub Actions 默认 7GB 内存）
          NODE_OPTIONS: --max-old-space-size=6144
        run: npm run generate

      - name: Install ossutil
        run: |
          wget https://gosspublic.alicdn.com/ossutil/1.7.16/ossutil64
          chmod 755 ossutil64
          mv ossutil64 /usr/local/bin/ossutil

      - name: Configure ossutil
        env:
          OSS_ENDPOINT: ${{ secrets.OSS_ENDPOINT }}
          OSS_ACCESS_KEY_ID: ${{ secrets.OSS_AK }}
          OSS_ACCESS_KEY_SECRET: ${{ secrets.OSS_SK }}
          OSS_BUCKET: ${{ secrets.OSS_BUCKET }}
        run: |
          ossutil config -e $OSS_ENDPOINT -i $OSS_ACCESS_KEY_ID -k $OSS_ACCESS_KEY_SECRET -L CH
          ossutil config -c bucket $OSS_BUCKET

      - name: Upload to OSS
        env:
          OSS_BUCKET: ${{ secrets.OSS_BUCKET }}
        run: |
          echo "Uploading to OSS bucket: $OSS_BUCKET"
          echo "OSS_ENDPOINT: ${{ secrets.OSS_ENDPOINT }}"

          # 检查 bucket 是否已配置
          if [ -z "$OSS_BUCKET" ]; then
            echo "Error: OSS_BUCKET secret is not set!"
            exit 1
          fi

          # 上传文件
          ossutil cp -r .output/public/ oss://$OSS_BUCKET/ -f || {
            echo "Error: Upload failed!"
            exit 1
          }

          echo "Upload completed successfully!"

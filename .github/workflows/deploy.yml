name: Build and Deploy

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
      
      - name: Install dependencies
        run: npm ci
      
      - name: Build for production
        env:
          NODE_ENV: production
          NUXT_PUBLIC_API_BASE: https://api.xifg.com.cn/api
        run: npm run build
      
      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-output
          path: .output
          retention-days: 7
      
      - name: Build summary
        run: |
          echo "## 🚀 构建完成" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**API 基础路径:** \`https://api.xifg.com.cn/api\`" >> $GITHUB_STEP_SUMMARY
          echo "**构建环境:** \`production\`" >> $GITHUB_STEP_SUMMARY
          echo "**输出目录:** \`.output\`" >> $GITHUB_STEP_SUMMARY
          if [ -d ".output" ]; then
            echo "**构建产物大小:** \`$(du -sh .output | cut -f1)\`" >> $GITHUB_STEP_SUMMARY
          fi
